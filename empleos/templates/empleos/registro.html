<!-- empleos/templates_empleos/registro.html -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-lg">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800">
                Crear Cuenta
            </h1>

            <p class="text-gray-500 mt-2">
                Regístrate para encontrar empleo
            </p>
        </div>

        <!-- Agregamos method="POST" para que Django lo procese -->
<form method="POST" class="space-y-5">
    {% csrf_token %} <!-- OBLIGATORIO por seguridad en Django -->

    <div>
        <label class="block text-gray-700 mb-2">Nombre Completo</label>
        <input
            type="text"
            name="nombre" 
            placeholder="Ingresa tu nombre"
            class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-gray-700 mb-2">Usuario</label>
        <input
            type="text"
            name="usuario"
            placeholder="Ingresa tu usuario"
            class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-gray-700 mb-2">Correo Electrónico</label>
        <input
            type="email"
            name="email"
            placeholder="correo@example.com"
            class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-gray-700 mb-2">Contraseña</label>
        <input
            type="password"
            name="password"
            placeholder="********"
            class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- El select ya tenía name="tipo_usuario", así que está bien -->
    <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Tipo de Usuario</label>
        <select name="Idrol" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            <option value="">seleccione una opcion </option>
            {% for rol in roles %}
                <option value="{{ rol.idrol }}">{{ rol.descripcion }}</option>
            {% endfor %}
        </select>
    </div>

    <button
        type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold transition duration-300">
        Registrarse
    </button>
</form>

        <p class="text-center text-gray-500 mt-6">
            ¿Ya tienes cuenta?

            <a href="/login/" class="text-blue-600 font-semibold hover:underline">
                Iniciar sesión
            </a>
        </p>

    </div>

</body>
</html>
